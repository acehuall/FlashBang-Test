<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashbang Demo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <img
      src="./1000014664.png"
      alt="Final reveal"
      class="final-image"
      id="finalImage"
    />

        <button id="startBtn" type="button">Do Not Click</button>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>

</html>
